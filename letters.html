<body>
    <h1>Click a Heart 💌</h1>

    <div class="hearts">

        <div>
            <span class="heart" onclick="toggleMessage('m1')">❤️</span>
            <div id="m1" class="message">
                You are my favorite person in the world.
            </div>
        </div>

        <div>
            <span class="heart" onclick="toggleMessage('m2')">💖</span>
            <div id="m2" class="message">
                Every day with you feels like a gift.
            </div>
        </div>

        <div>
            <span class="heart" onclick="toggleMessage('m3')">💕</span>
            <div id="m3" class="message">
                I can't wait to make more memories with you.
            </div>
        </div>

    </div>

    <div class="secret">

        <h2>🔒 Secret Message</h2>

        <input type="password" id="pw" placeholder="Enter password">
        <button onclick="checkPassword()">Unlock</button>

        <div id="secretMessage">
            You are the love of my life ❤️
        </div>

    </div>
</body>

</html>
